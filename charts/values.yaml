server:
  certificates:
    port: 3000
  http:
    port: &serverHttpPort 3001
  socks:
    port: 3002

replicaCount: 1
image:
  repository: ${CI_REGISTRY_IMAGE}
  pullPolicy: Always
  tag: ${PROJECT_RELEASE_VERSION}
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 2000
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001


service:
  type: ClusterIP

resources: 
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  tcpSocket:
    port: *serverHttpPort
  initialDelaySeconds: 20
  periodSeconds: 5
  failureThreshold: 10
readinessProbe:
  tcpSocket:
    port: *serverHttpPort
  initialDelaySeconds: 20
  periodSeconds: 5
  failureThreshold: 10

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: external-config
    configMap:
      name: tier2-proxy-external-configmap

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: external-config
    mountPath: /config/

env:
  - name: PROXY_CERTIFICATES_SERVER_PORT
    value: "{{- .Values.server.certificates.port }}"
  - name: PROXY_HTTP_SERVER_PORT
    value: "{{- .Values.server.http.port }}"
  - name: PROXY_SOCKS_SERVER_PORT
    value: "{{- .Values.server.socks.port }}"
  - name: CERTS_FOLDER
    value: "/etc/certs"
  - name: SIMPL_AUTHENTICATION_PROVIDER_BASEURL
    value: "http://authentication-provider.{{ .Release.Namespace }}.svc.cluster.local:8080"

nodeSelector: {}

tolerations: []

affinity: {}


# Additional application configuration for the Tier 2 Proxy service
appConfig: |